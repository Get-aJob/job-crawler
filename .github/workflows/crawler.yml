name: Job Crawler

on:
  schedule:
    - cron: "0 * * * *" # 매 1시간
  workflow_dispatch: # 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Node 설치
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: 의존성 설치
        run: npm install

      - name: 크롤러 실행
        run: npx ts-node src/crawler/main.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
